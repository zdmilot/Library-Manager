<!DOCTYPE html>
<html>
<head>
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/all.min.css" rel="stylesheet">
<link href="css/main.css" rel="stylesheet">
</head>
<body style="padding: 40px; background: #e9ecef;">
<div style="max-width: 800px; margin: 0 auto;">
<!-- Demo Method Files Section -->
<div class="card mb-3 exporter-card" id="pkg-demo-section">
    <div class="card-header d-flex align-items-center">
        <label class="custom-control custom-switch mb-0 mr-2" title="Enable or disable the Demo Method Files section">
            <input type="checkbox" class="custom-control-input pkg-section-toggle" id="pkg-toggle-demo" data-section="pkg-demo-body">
            <span class="custom-control-label"></span>
        </label>
        <i class="fas fa-flask mr-2 color-medium"></i>Demo Method Files
        <span class="text-muted ml-2 text-sm font-weight-normal">(optional)</span>
    </div>
</div>

<!-- Labware Files Section -->
<div class="card mb-3 exporter-card" id="pkg-labware-section">
    <div class="card-header d-flex align-items-center">
        <label class="custom-control custom-switch mb-0 mr-2" title="Enable or disable the Labware Files section">
            <input type="checkbox" class="custom-control-input pkg-section-toggle" id="pkg-toggle-labware" data-section="pkg-labware-body">
            <span class="custom-control-label"></span>
        </label>
        <i class="fas fa-th mr-2 color-medium"></i>Labware Files
        <span class="text-muted ml-2 text-sm font-weight-normal">(optional)</span>
    </div>
</div>

<!-- Bin Files Section -->
<div class="card mb-3 exporter-card" id="pkg-bin-files-section">
    <div class="card-header d-flex align-items-center">
        <label class="custom-control custom-switch mb-0 mr-2" title="Enable or disable the Bin Files section">
            <input type="checkbox" class="custom-control-input pkg-section-toggle" id="pkg-toggle-bin" data-section="pkg-bin-body">
            <span class="custom-control-label"></span>
        </label>
        <i class="fas fa-cogs mr-2 color-medium"></i>Bin Files
        <span class="text-muted ml-2 text-sm font-weight-normal">(optional)</span>
    </div>
</div>

<!-- Normal card header for comparison -->
<div class="card mb-3 exporter-card">
    <div class="card-header">
        <i class="fas fa-image mr-2 color-medium"></i>Library Icon / Image (no toggle)
    </div>
</div>
</div>
</body>
</html>
