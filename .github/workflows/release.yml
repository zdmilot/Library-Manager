name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_increment:
        description: 'Version increment to add to current version (e.g. 0.0.1 for patch, 0.1.0 for minor, 1.0.0 for major)'
        required: true
        type: string
      release_notes:
        description: 'Release notes for this version'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute new version
        id: versioning
        shell: pwsh
        run: |
          $increment = "${{ inputs.version_increment }}"
          $versionPattern = '^\d+\.\d+\.\d+$'

          # Validate increment format
          if ($increment -notmatch $versionPattern) {
            Write-Error "Invalid increment format '$increment'. Must be MAJOR.MINOR.PATCH (e.g. 0.0.1)."
            exit 1
          }

          # Validate that exactly one component of the increment is non-zero
          $inc = $increment -split '\.' | ForEach-Object { [int]$_ }
          $nonZero = ($inc | Where-Object { $_ -ne 0 }).Count
          if ($nonZero -ne 1) {
            Write-Error "Exactly one component of the increment must be non-zero (e.g. 0.0.1, 0.1.0, or 1.0.0). Got: '$increment'."
            exit 1
          }

          # Read current version from package.json
          $pkgJson = Get-Content "package.json" -Raw | ConvertFrom-Json
          $currentVersion = $pkgJson.version

          if ($currentVersion -notmatch $versionPattern) {
            Write-Error "Unexpected version format in package.json: '$currentVersion'."
            exit 1
          }

          # Parse current version components
          $cur = $currentVersion -split '\.' | ForEach-Object { [int]$_ }

          # Apply semver semantics: higher-component bumps reset lower components to 0
          if ($inc[0] -gt 0) {
            $newVersion = "$($cur[0] + $inc[0]).0.0"
          } elseif ($inc[1] -gt 0) {
            $newVersion = "$($cur[0]).$($cur[1] + $inc[1]).0"
          } else {
            $newVersion = "$($cur[0]).$($cur[1]).$($cur[2] + $inc[2])"
          }

          Write-Host "Current version : $currentVersion"
          Write-Host "Increment       : $increment"
          Write-Host "New version     : $newVersion"

          echo "version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Check release does not already exist
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ steps.versioning.outputs.version }}"
          # Check for an existing GitHub release with this tag. If one exists,
          # action-gh-release would attempt to update it (delete + re-upload
          # assets), which fails for immutable releases.
          gh release view $tag --repo ${{ github.repository }} 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Error "A GitHub release for tag '$tag' already exists. Increment the version to create a new release."
            exit 1
          }
          Write-Host "No existing release found for tag '$tag', proceeding with release creation."

      - name: Update version in installer.iss
        shell: pwsh
        run: |
          $version = "${{ steps.versioning.outputs.version }}"
          $file = "installer.iss"
          $content = Get-Content $file -Raw

          # Update the #define MyAppVersion line
          $content = $content -replace '(?m)^(#define MyAppVersion\s+")[^"]*(")', "`${1}${version}`${2}"

          # Update the comment header version line
          $content = $content -replace '(?m)^(;\s*Version:\s*)[\d.]+', "`${1}${version}"

          Set-Content $file $content -NoNewline

      - name: Update version in package.json
        shell: pwsh
        run: |
          $version = "${{ steps.versioning.outputs.version }}"
          $file = "package.json"
          $content = Get-Content $file -Raw
          $content = $content -replace '("version"\s*:\s*")[^"]*(")', "`${1}${version}`${2}"
          Set-Content $file $content -NoNewline

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Compile installer
        shell: pwsh
        run: |
          $version = "${{ steps.versioning.outputs.version }}"
          $outputDir = "${{ github.workspace }}\artifacts"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          iscc "/O$outputDir" installer.iss

      - name: Verify installer output
        shell: pwsh
        run: |
          $expected = "artifacts\LibraryManager_v${{ steps.versioning.outputs.version }}_Setup.exe"
          if (-not (Test-Path $expected)) {
            Write-Error "Installer not found at $expected"
            Get-ChildItem artifacts -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "Installer built: $expected"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.version }}
          name: v${{ steps.versioning.outputs.version }}
          body: ${{ inputs.release_notes }}
          files: |
            artifacts/LibraryManager_v${{ steps.versioning.outputs.version }}_Setup.exe
            tools/hxlibpkg-extract/hxlibpkg-extract.exe
